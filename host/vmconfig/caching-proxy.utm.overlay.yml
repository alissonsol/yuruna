# macOS/UTM (QEMU) overlay for caching-proxy.base.user-data.
# Anchor sections in base-file order. An empty section emits nothing at that anchor.
# === YURUNA_OVERLAY_HOST_AGENT_PKG ===
# === YURUNA_OVERLAY_NIC_OFFLOAD ===
  # --- See https://yuruna.link/caching#disable-nic-tx-offloads-on-avf-bridge
  - path: /etc/systemd/network/10-yuruna-no-offload.link
    permissions: '0644'
    owner: root:root
    content: |
      [Match]
      Driver=virtio_net

      [Link]
      TCPSegmentationOffload=false
      GenericSegmentationOffload=false
      GenericReceiveOffload=false
      TransmitChecksumOffload=false
# === YURUNA_OVERLAY_RUNCMD_NET ===
  # --- See https://yuruna.link/caching#disable-nic-tx-offloads-on-avf-bridge
  - ethtool -K enp0s1 tx off gso off tso off gro off
  # --- See https://yuruna.link/caching#utm-shared-nat-topology (macos-host hosts alias)
  - |
    GW=$(ip -4 route show default 2>/dev/null | awk '/default/ {print $3; exit}')
    if [ -n "$GW" ] && ! grep -q "^${GW}[[:space:]]" /etc/hosts; then
      echo "${GW} macos-host" >> /etc/hosts
    fi
# === YURUNA_OVERLAY_RUNCMD_HOST_AGENT ===
# === YURUNA_OVERLAY_FIRMWARE_PKGS ===
    for pkg in linux-firmware linux-generic-hwe-24.04; do
