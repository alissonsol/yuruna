# macOS/UTM (QEMU) overlay for ubuntu.server.base.user-data.
# Anchor sections in base-file order. An empty section emits nothing at that anchor.
# === YURUNA_OVERLAY_NETWORK ===
  # --- See https://yuruna.link/vmconfig#pin-ipv4-dhcp-refuse-ipv6-ra
  network:
    version: 2
    ethernets:
      enp0s1:
        dhcp4: true
        dhcp6: false
        accept-ra: false
# === YURUNA_OVERLAY_EARLY_COMMANDS ===
# === YURUNA_OVERLAY_GRUB_PRE_CONSOLE_QUIET ===
