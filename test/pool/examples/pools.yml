#
# Example pool intent. Validates against test/schemas/pools.schema.yml.
# This is the file the pool admin CLI authors and each runner pulls from the
# bare git repo on the caching-proxy. `members[]` is the single source of truth
# for membership: replace the example hostIds with your hosts' real
# runtime/host.uuid values (42-prefixed 32-hex). `desiredState` controls
# run/pause/drain; `testSets` are run by the pool's members; `config` overrides
# cycle knobs and `gating` sets the advisory pool-alert thresholds.
schemaVersion: 1
pools:
  - poolId: lab
    displayName: Lab pool
    members:
      - 42abcdef0123456789abcdef01234567
      - 4200112233445566778899aabbccddee
    testSets:
      - name: smoke
        order: 0
        cycleStrategy: all
    config:
      testCycle:
        stepTimeoutMinutes: 45
    gating:
      failuresBeforeAlert: 3
      successesBeforeRearm: 2
      quorum:
        healthyThreshold: 0.5
        degradedAfterMinutes: 30
    desiredState: run
