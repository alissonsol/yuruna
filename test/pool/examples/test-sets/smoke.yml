#
# Example test-set manifest. Validates against test/schemas/test-set.schema.yml.
# `sequences` are top-level sequence names (the same identifiers test.runner.yml
# consumes). Assign this set to a pool with Set-PoolTestSet.ps1; the pool's
# members execute it on their next cycle.
schemaVersion: 1
name: smoke
sequences:
  - amazon.linux.2023.install
  - ubuntu.server.24.install
requiredGuests:
  - guest.amazon.linux.2023
  - guest.ubuntu.server.24
perGuestOverrides:
  guest.ubuntu.server.24:
    keystrokeMechanism: GUI
    variables:
      username: yuser1
provisioning:
  betweenSets: none
