$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/actions.schema.yml
title: Yuruna action catalogue
description: >
  Documentation file (test/sequences/actions.yml) describing the parameters
  for every action handled by Invoke-Sequence.psm1. Pure prose — the runner
  never reads this file; it's a reference for sequence authors. The action
  names here are the same enum as in sequence.schema.yml's step.action.

type: object
additionalProperties: false
required: [actions]

properties:

  actions:
    type: object
    description: Map<actionName, plain-prose description>.
    propertyNames:
      enum:
        - break
        - callExtension
        - fetchAndExecute
        - inputText
        - inputTextAndEnter
        - loadDiskSnapshot
        - passwdPrompt
        - pressKey
        - retry
        - saveDiskSnapshot
        - saveSystemDiagnostic
        - sshExec
        - sshFetchAndExecute
        - sshWaitReady
        - takeScreenshot
        - tapOn
        - typeAndEnter
        - waitForAndEnter
        - waitForSeconds
        - waitForText
    additionalProperties:
      type: string
      minLength: 1
