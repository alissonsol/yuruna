$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/notification.transports.schema.yml
title: Yuruna notification transports
description: >
  Transport credentials and per-event-code subscribers for
  Send-Notification.

type: object
additionalProperties: false
required: [transports, subscribers]

properties:
  transports:
    type: object
    additionalProperties: false
    properties:
      resend:
        type: object
        additionalProperties: false
        required: [apiKey, fromEmail]
        properties:
          apiKey:    { type: string }
          fromEmail: { type: string }

  subscribers:
    type: object
    additionalProperties:
      type: array
      items:
        type: object
        additionalProperties: false
        required: [transport, address]
        properties:
          transport: { type: string, enum: [email] }
          address:   { type: string }
    propertyNames:
      pattern: '^[A-Za-z0-9._-]+(\.[A-Za-z0-9._-]+)*$'
