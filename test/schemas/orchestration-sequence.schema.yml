$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/orchestration-sequence.schema.yml
title: Yuruna orchestration sequence
description: >
  An ordered list of inner sequences to run, each via an
  `action: InvokeTestSequence` step. Test-Sequence.ps1 detects this shape
  (no `baseline:`, InvokeTestSequence steps) and hands it to
  Test.Orchestrator, which runs every inner sequence under ONE status.json
  cycle -- one top-level row per inner sequence, unified naming and pass/fail.
  The local one-shot successor to the retired test-set manifest
  (Test-SequenceSet.ps1). An inner sequence may be a guest sequence
  (sequence.schema.yml: baseline + steps) or a host action (a `host:` block).

  Ownership + nesting: exactly one process -- the outermost -- owns the cycle
  document. A guest step runs IN-PROCESS as a top-level row. A host-action
  step may itself re-enter Test-Sequence.ps1 in child processes (e.g.
  Set-Resource.ps1 fanning out per-stage guest builds); those child runs do
  not reset status.json -- they ATTACH as nested tiles under the step, to any
  depth, via the inherited cycle-context handle, and write their transcripts
  under the owner's cycle folder. See Test.Status.psm1 "Nested-cycle support".

type: object
required: [name, steps]
additionalProperties: false

properties:

  name:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
    description: >
      Orchestration name, shown in cycle logs and the dashboard. Matches
      the manifest filename stem by convention.

  description:
    type: string
    description: One-line summary shown in cycle logs.

  continueOnError:
    type: boolean
    description: >
      Keep running remaining steps after a failure (report all at the
      end). Default false: stop at the first failure and mark the rest
      skipped.

  steps:
    type: array
    minItems: 1
    description: Ordered inner-sequence invocations.
    items:
      type: object
      additionalProperties: false
      required: [action, sequence]
      properties:
        action:
          const: InvokeTestSequence
          description: The only orchestration-step verb.
        sequence:
          type: string
          pattern: "^[A-Za-z0-9._-]+$"
          description: >
            Inner sequence to run: a base name (resolved through the
            standard project-then-framework search) or a filename. A
            trailing .yml/.yaml is accepted and stripped.
        description:
          type: string
          description: Free-form label shown in the cycle log and dashboard.
