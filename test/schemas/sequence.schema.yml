$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/sequence.schema.yml
title: Yuruna interaction sequence
description: >
  Drives a VM through OCR/keystroke or SSH steps. Action set matches the
  switch in test/modules/Invoke-Sequence.psm1; the catalog in
  test/sequences/actions.yml documents per-action parameters and defaults.

type: object
required: [description, baseline, steps]
additionalProperties: false

properties:

  sequenceGuid:
    type: string
    description: >
      Perf-log identity. `42`-prefixed 32-hex GUID (formatted with dashes
      as 42xxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx). Persistent across renames;
      Test.Perf.psm1 stamps every step row with this value so cross-host
      and cross-cycle analytics can join even after a sequence rename.
    pattern: "^42[0-9a-fA-F]{6}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"

  sequenceRevision:
    type: integer
    minimum: 1
    description: >
      Author-bumped integer. Increment when steps are added, removed,
      or reordered. Lets perf analytics segment "Step X duration" by
      sequence shape without depending on commit dates.

  description:
    type: string
    description: One-line summary shown in cycle logs and the dashboard.

  baseline:
    type: object
    description: >
      Per-guest-OS prerequisite chain. Each key is a guest OS identifier
      (e.g. "ubuntu.server.24"); each value is an ordered list of sequence
      names (no extension, no folder) that must run before this one.
    minProperties: 1
    additionalProperties:
      type: array
      items:
        type: string
        pattern: "^[A-Za-z0-9._-]+$"

  variables:
    type: object
    description: >
      Scalar map injected as ${name} substitutions into step parameters.
      Built-ins (${vmName}, ${hostType}, ${guestKey}) are added by the
      runner and should not be redeclared.
    additionalProperties:
      type: [string, number, boolean]

  requiresSnapshot:
    type: object
    description: >
      Declares that this sequence is a CONSUMER of a disk snapshot
      produced by an earlier sequence in its `baseline:` chain. Two
      effects on the runner:

      1. VM-name override. The runtime VM name becomes `id` (instead of
         `test-<guestKey>`). The chain's terminal `saveDiskSnapshot`
         already renames `test-*` -> id; pre-naming the VM as id from
         the start makes that rename a no-op on the cold path and lets
         the warm path target the persisted VM directly.

      2. Chain skip. Before walking the baseline chain, the runner
         probes the host for snapshot id on VM id. Hit -> skip every
         prereq sequence and run only this top-level (the first
         `loadDiskSnapshot` reverts the disk). Miss -> walk the full
         chain so the prereqs build the snapshot.

      WARNING (operator's responsibility): the snapshot is FROZEN on-
      disk state. Any variable that affects what's baked into the VM
      (username, hostname, anything templated into cloud-init / users /
      ssh keys) MUST match the value the chain's snapshot-producing
      sequence used. On the cold path, the cascade hands top-of-chain
      variables down to the prereqs and everything aligns. On the warm
      path the prereqs don't re-run, so a mismatched variable here
      will reference state that doesn't exist on disk (e.g. a
      passwdPrompt for a username the snapshot's /etc/passwd never had).
    required: [id]
    additionalProperties: false
    properties:
      id:
        type: string
        description: >
          Snapshot id produced by the terminal `saveDiskSnapshot` of
          the baseline chain. Must match exactly — the runner uses
          this both as the snapshot lookup key AND as the persisted
          VM name (the chain's saveDiskSnapshot renames to this id).

  steps:
    type: array
    description: Ordered list of actions to execute.
    items:
      $ref: "#/$defs/step"

$defs:

  step:
    type: object
    description: One action invocation.
    required: [action]
    properties:
      action:
        type: string
        description: Which handler in Invoke-Sequence.psm1 to dispatch to.
        enum:
          - break
          - callExtension
          - fetchAndExecute
          - inputText
          - inputTextAndEnter
          - loadDiskSnapshot
          - networkRelease
          - passwdPrompt
          - pressKey
          - retry
          - saveDiskSnapshot
          - saveSystemDiagnostic
          - sshExec
          - sshFetchAndExecute
          - sshWaitReady
          - takeScreenshot
          - tapOn
          - typeAndEnter           # deprecated alias for inputTextAndEnter
          - waitForAndEnter
          - waitForSeconds
          - waitForText
      description:
        type: string
        description: Free-form label shown in the cycle log and dashboard.

    # Per-action required-field constraints. Each branch only declares
    # what *must* be present and the canonical property types; optional
    # fields are accepted via additionalProperties on the step itself.
    allOf:

      - if: { properties: { action: { const: callExtension } } }
        then:
          required: [method]
          properties:
            method:
              type: string
              pattern: "^[A-Za-z0-9_]+\\.[A-Za-z][A-Za-z0-9_-]*$"
              description: "area.Method form, e.g. authentication.SetPassword."
            args:
              type: object
              additionalProperties:
                type: [string, number, boolean]

      - if: { properties: { action: { const: fetchAndExecute } } }
        then:
          required: [text, waitPattern]
          properties:
            text:                   { type: string }
            waitPattern:            { type: string }
            charDelayMs:            { type: integer, minimum: 0 }
            delaySeconds:           { type: number,  minimum: 0 }
            timeoutSeconds:         { type: integer, minimum: 0 }
            pollSeconds:            { type: number,  minimum: 0 }

      - if: { properties: { action: { const: pressKey } } }
        then:
          required: [name]
          properties:
            name:
              type: string
              enum: [Enter, Tab, Space, Escape, Up, Down, Left, Right,
                     F1, F2, F3, F4, F5, F6, F7, F8, F9, F10, F11, F12]

      - if: { properties: { action: { const: retry } } }
        then:
          required: [steps]
          properties:
            maxAttempts: { type: integer, minimum: 1 }
            steps:
              type: array
              minItems: 1
              items: { $ref: "#/$defs/step" }

      - if: { properties: { action: { const: inputText } } }
        then:
          required: [text]
          properties:
            text:         { type: string }
            sensitive:    { type: boolean }
            charDelayMs:  { type: integer, minimum: 0 }

      - if:
          properties:
            action: { enum: [inputTextAndEnter, typeAndEnter] }
        then:
          required: [text]
          properties:
            text:         { type: string }
            sensitive:    { type: boolean }
            charDelayMs:  { type: integer, minimum: 0 }
            delaySeconds: { type: number,  minimum: 0 }

      - if: { properties: { action: { const: passwdPrompt } } }
        then:
          required: [pattern, text]
          properties:
            pattern:             { $ref: "#/$defs/patternOrArray" }
            text:                { type: string }
            timeoutSeconds:      { type: integer, minimum: 0 }
            pollSeconds:         { type: number,  minimum: 0 }
            freshMatch:          { type: boolean }
            freshMatchTailLines: { type: integer, minimum: 0 }
            failurePatterns:     { $ref: "#/$defs/patternOrArray" }
            tabCount:            { type: integer, minimum: 0 }
            charDelayMs:         { type: integer, minimum: 0 }
            delaySeconds:        { type: number,  minimum: 0 }

      - if: { properties: { action: { const: saveSystemDiagnostic } } }
        then:
          required: [id]
          properties:
            id:
              type: string
              description: >
                Appended to the saved filename so two captures in the
                same cycle don't collide (e.g. "after.k8s.bootstrap").

      - if: { properties: { action: { const: saveDiskSnapshot } } }
        then:
          required: [id]
          properties:
            id:
              type: string
              description: >
                Snapshot name attached to this VM's disks; overwrites
                an existing snapshot with the same name.

      - if: { properties: { action: { const: loadDiskSnapshot } } }
        then:
          required: [id]
          properties:
            id:
              type: string
              description: >
                Name of the snapshot to revert this VM's disks to.

      - if: { properties: { action: { const: break } } }
        then:
          properties:
            reason:
              type: string
              description: >
                Free-form text written into the marker file so the
                operator knows why the sequence stopped here.
            id:
              type: string
              description: >
                Optional label for this breakpoint, shown in the marker
                file and the status UI. It is a label only: it does NOT
                trigger a snapshot restore, even when it happens to match
                a real snapshot name (e.g. the workload's requiresSnapshot
                / loadDiskSnapshot id). A plain break pauses and, on
                Continue, resumes in place -- the usual breakpoint
                semantics. Set restoreOnContinue to opt into a restore.
            restoreOnContinue:
              type: boolean
              description: >
                When true AND `id` names an existing snapshot, clicking
                "Continue" in the status UI calls Restore-VMDiskSnapshot
                -Id <id> followed by Start-VM before resuming (a one-click
                "rewind to checkpoint + continue" workflow, e.g. a break
                paired with a prior saveDiskSnapshot -Id <same>). Default
                false: Continue resumes in place. Manual marker-file
                delete always resumes in place regardless of this flag.

      - if: { properties: { action: { const: takeScreenshot } } }
        then:
          properties:
            label: { type: string }

      - if: { properties: { action: { const: sshExec } } }
        then:
          required: [command]
          properties:
            command:        { type: string }
            timeoutSeconds: { type: integer, minimum: 0 }
            allowFailure:   { type: boolean }
            sensitive:      { type: boolean }

      - if: { properties: { action: { const: sshFetchAndExecute } } }
        then:
          required: [command]
          properties:
            command:        { type: string }
            timeoutSeconds: { type: integer, minimum: 0 }

      - if: { properties: { action: { const: sshWaitReady } } }
        then:
          properties:
            timeoutSeconds:           { type: integer, minimum: 0 }
            pollSeconds:              { type: number,  minimum: 0 }
            installerFailurePatterns: { $ref: "#/$defs/patternOrArray" }

      - if: { properties: { action: { const: tapOn } } }
        then:
          required: [label]
          properties:
            label:          { $ref: "#/$defs/patternOrArray" }
            timeoutSeconds: { type: integer, minimum: 0 }
            pollSeconds:    { type: number,  minimum: 0 }
            offsetX:        { type: integer }
            offsetY:        { type: integer }

      - if: { properties: { action: { const: waitForAndEnter } } }
        then:
          required: [pattern, text]
          properties:
            pattern:             { $ref: "#/$defs/patternOrArray" }
            text:                { type: string }
            timeoutSeconds:      { type: integer, minimum: 0 }
            pollSeconds:         { type: number,  minimum: 0 }
            freshMatch:          { type: boolean }
            freshMatchTailLines: { type: integer, minimum: 0 }
            failurePatterns:     { $ref: "#/$defs/patternOrArray" }
            sensitive:           { type: boolean }
            tabCount:            { type: integer, minimum: 0 }
            charDelayMs:         { type: integer, minimum: 0 }
            delaySeconds:        { type: number,  minimum: 0 }

      - if: { properties: { action: { const: waitForSeconds } } }
        then:
          required: [seconds]
          properties:
            seconds: { type: number, minimum: 0 }

      - if: { properties: { action: { const: waitForText } } }
        then:
          required: [pattern]
          properties:
            pattern:             { $ref: "#/$defs/patternOrArray" }
            timeoutSeconds:      { type: integer, minimum: 0 }
            pollSeconds:         { type: number,  minimum: 0 }
            freshMatch:          { type: boolean }
            freshMatchTailLines: { type: integer, minimum: 0 }
            failurePatterns:     { $ref: "#/$defs/patternOrArray" }

  patternOrArray:
    description: A single OCR pattern, or an array of candidate patterns.
    oneOf:
      - type: string
      - type: array
        minItems: 1
        items: { type: string }
