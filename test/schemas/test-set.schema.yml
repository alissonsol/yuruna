$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/test-set.schema.yml
title: Yuruna test-set manifest
description: >
  A named bundle of sequences a pool runs, with per-guest overrides. Pulled
  with the pool intent; the pool planner iterates the manifest's sequences[]
  in place of test.runner.yml sequences[] and applies perGuestOverrides.
  provisioning.betweenSets values other than 'none' are not yet implemented
  and run as 'none' (with a warning).

type: object
required: [schemaVersion, name]
additionalProperties: false

properties:

  schemaVersion:
    type: integer
    const: 1
    description: Schema contract version. Bump only on a breaking shape change.

  name:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
    description: Test-set name; matches the manifest filename stem and the pools.yml testSets[].name reference.

  sequences:
    type: array
    description: >
      Top-level sequence names to run -- the same identifiers test.runner.yml's
      sequences[] consumes (no extension, no folder).
    items:
      type: string
      pattern: "^[A-Za-z0-9._-]+$"

  requiredGuests:
    type: array
    description: >
      Guest identifiers this test-set needs available (e.g. guest.ubuntu.server.24),
      same form as test.config.yml guestSequence[]. Intended for planner host
      selection together with guests.compatibility.yml; not yet consumed.
    items:
      type: string
      pattern: "^[A-Za-z0-9._-]+$"

  perGuestOverrides:
    type: object
    description: >
      Per-guest field overrides keyed by guest identifier, layered by the
      pool planner over the global-per-cycle knobs.
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        keystrokeMechanism:
          type: string
          enum: [GUI, SSH]
          description: Per-guest keystroke mechanism, applied by the planner via perGuestOverrides.
        username:
          type: string
        variables:
          type: object
          additionalProperties:
            type: [string, number, boolean]

  provisioning:
    type: object
    additionalProperties: false
    description: How VM state is handled between test-sets. Only 'none' is implemented; other values warn and run as 'none'.
    properties:
      betweenSets:
        type: string
        enum: [none, snapshot-revert, reprovision]
        description: Default "none" (reuse VM state across sets).
