$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/test-set.schema.yml
title: Yuruna test-set manifest
description: >
  A named bundle of sequences a pool runs, with per-guest overrides. Authored now
  (frozen v1 shape) and pulled with the pool intent; EXECUTION (iterating the
  manifest instead of test.runner.yml sequences[], applying perGuestOverrides,
  honoring provisioning.betweenSets) is a later phase. Freezing the shape now lets
  operators author test-sets that the execution phase consumes without a reshape.

type: object
required: [schemaVersion, name]
additionalProperties: false

properties:

  schemaVersion:
    type: integer
    const: 1
    description: Schema contract version. Bump only on a breaking shape change.

  name:
    type: string
    pattern: "^[a-z0-9][a-z0-9._-]*$"
    description: Test-set name; matches the manifest filename stem and the pools.yml testSets[].name reference.

  sequences:
    type: array
    description: >
      Top-level sequence names to run -- the same identifiers test.runner.yml's
      sequences[] consumes (no extension, no folder).
    items:
      type: string
      pattern: "^[A-Za-z0-9._-]+$"

  requiredGuests:
    type: array
    description: >
      Guest identifiers this test-set needs available (e.g. guest.ubuntu.server.24),
      same form as test.config.yml guestSequence[]. The later planner uses these
      with guests.compatibility.yml to pick a host.
    items:
      type: string
      pattern: "^[A-Za-z0-9._-]+$"

  perGuestOverrides:
    type: object
    description: >
      Per-guest field overrides keyed by guest identifier. Lifts knobs that are
      global-per-cycle today to per-guest. AUTHORED ONLY this release -- the
      planner applies them in a later phase. NOTE: keystrokeMechanism is resolved
      globally at plan time today, so it is reserved here and flagged non-acting
      until the execution phase wires it per-guest.
    additionalProperties:
      type: object
      additionalProperties: false
      properties:
        keystrokeMechanism:
          type: string
          enum: [GUI, SSH]
          description: Reserved; non-acting until the execution phase.
        username:
          type: string
        variables:
          type: object
          additionalProperties:
            type: [string, number, boolean]

  provisioning:
    type: object
    additionalProperties: false
    description: How VM state is handled between test-sets (authored only).
    properties:
      betweenSets:
        type: string
        enum: [none, snapshot-revert, reprovision]
        description: Default "none" (reuse VM state across sets).
