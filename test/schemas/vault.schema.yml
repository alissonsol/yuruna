$schema: https://json-schema.org/draft/2020-12/schema
$id: https://yuruna.com/schemas/vault.schema.yml
title: Yuruna authentication vault
description: >
  Per-cycle plaintext credential cache. Wiped on cycle success;
  left in place on cycle failure for debugging.

type: object
additionalProperties: false
required: [users]

properties:
  users:
    type: object
    additionalProperties:
      type: object
      additionalProperties: false
      required: [password, updatedUtc]
      properties:
        password:         { type: string, minLength: 1 }
        # previousPassword carries the prior secret across a Set-Password
        # rotation -- empty for entries created via Get-Password's lazy
        # auto-gen, populated by Set-Password when an existing entry is
        # overwritten. Either form is valid (no minLength), so the
        # schema accepts the empty-string default that fresh entries ship
        # with as well as a non-empty rotation breadcrumb.
        previousPassword: { type: string }
        updatedUtc:       { type: string, format: date-time }
    propertyNames:
      pattern: '^[A-Za-z0-9._-]+$'
