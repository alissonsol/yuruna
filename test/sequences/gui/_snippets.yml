# Reusable step snippets for gui (OCR/keystroke) sequences. Reference one from a
# sequence (or a retry block) with `- snippet: <name>`; the loader splices the
# named step list in place. A project may ship its own
# project/<...>/test/gui/_snippets.yml whose names override these. See the
# snippet section of docs/test-sequences.md.

# Wake a freshly-rebooted agetty before typing a username. The first keystroke
# into a cold console (just-redrawn login: prompt) is swallowed while the tty
# input layer is still draining, so on KVM (one virsh send-key per char, no
# lead-in) the leading character of the username is lost. Pressing Enter (a
# harmless empty submit at a login: prompt) and pausing lets agetty settle so
# the subsequent passwdPrompt types into a stable prompt.
firstLoginPrime:
  - action: waitForText
    pattern: "login:"
    timeoutSeconds: 600
    description: "OCR: login:"

  - action: pressKey
    name: Enter
    description: "Enter"

  - action: waitForSeconds
    seconds: 2
    description: "Pause: agetty redraw"
