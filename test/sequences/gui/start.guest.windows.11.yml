# Interaction sequence for driving VM installation.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 4270d664-926a-4f4c-8a1a-74e041ad3902
sequenceRevision: 1

description: "Windows 11: bypass 'Press any key to boot from CD/DVD' then let autounattend.xml drive the install."
baseline:
  windows.11: []

steps:
  - action: waitForSeconds
    seconds: 3
    description: "Pause before UEFI + vmconnect init"

  - action: pressKey
    name: Enter
    description: "Boot from CD/DVD (first attempt)"

  - action: waitForSeconds
    seconds: 5
    description: "Pause before retrying"

  - action: pressKey
    name: Enter
    description: "Boot from CD/DVD (retry)"
