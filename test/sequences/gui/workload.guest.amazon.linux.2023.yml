# ${vmName}, ${hostType}, ${guestKey}, ${hostname} are built-in. ${ext:area.Method(args)}
# invokes the active extension under test/extension/<area>/.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 4246401e-0173-4605-b3b0-e2a85c16ade5
sequenceRevision: 2

description: "Amazon Linux 2023: log in, install the Desktop package group."
baseline:
  amazon.linux.2023:
    - start.guest.amazon.linux.2023
variables:
  username: yauser1

steps:
  - action: retry
    maxAttempts: 2
    description: "Login + retry"
    steps:
      - snippet: firstLoginPrime

      - action: passwdPrompt
        pattern: "login:"
        timeoutSeconds: 600
        text: "${username}"
        description: "OCR: login:"

      - action: passwdPrompt
        pattern: "Password:"
        text: "${ext:authentication.GetPassword(${username})}"
        description: "OCR: Password:"

  - action: waitForText
    pattern: "${username}@${hostname}"
    timeoutSeconds: 90
    description: "OCR: ${username}@${hostname}"

  - action: inputTextAndEnter
    # `&& echo DESKTOP_INSTALL_DONE` prints a sentinel only on dnf success.
    # Matching that rare marker instead of the shell prompt avoids the
    # username@hostname false-match against the login banner (the prompt
    # tokens also appear in "<host> login: <user>") and only reports success
    # when the install actually completed exit-0.
    text: 'sudo dnf groupinstall -y "Desktop" && echo DESKTOP_INSTALL_DONE'
    description: "GUI install"

  - action: waitForText
    # Underscores keep this one atomic fuzzy token (not in the segment-split
    # set), and freshMatch (last 12 OCR lines) ignores the echoed command that
    # carried the same marker, matching only the post-install echo.
    pattern: "DESKTOP_INSTALL_DONE"
    timeoutSeconds: 300
    freshMatch: true
    description: "OCR: DESKTOP_INSTALL_DONE"

  - action: inputTextAndEnter
    text: 'dnf list installed "*desktop*"'
    description: "Show installed desktop packages"

  - action: waitForSeconds
    seconds: 10
    description: "Pause for displayed output."
