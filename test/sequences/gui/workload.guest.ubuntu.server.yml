# yaml-language-server: $schema=../../schemas/sequence.schema.yml

# Interaction sequence for driving VM workload testing.
# See possible actions in the actions.yml file.
# ${vmName}, ${hostType}, ${guestKey} are built-in. ${ext:area.Method(args)}
# invokes the active extension under test/extension/<area>/.

description: "Ubuntu Server: log in, install VS Code via the guest.ubuntu.server workload scripts."
baseline:
  ubuntu.server:
    - start.guest.ubuntu.server
variables:
  username: yuuser1

steps:
  - action: passwdPrompt
    pattern: "login:"
    timeoutSeconds: 600
    text: "${username}"
    description: "${vmName} login:"

  - action: passwdPrompt
    pattern: "Password:"
    timeoutSeconds: 90
    text: "${ext:authentication.GetPassword(${username})}"
    description: "Password:"

  - action: waitForText
    pattern: "${username}@${vmName}"
    timeoutSeconds: 90
    description: "${username}@${vmName}"

  - action: waitForSeconds
    seconds: 9
    description: "Pause before installing toolset"

  - action: fetchAndExecute
    text: "/automation/fetch-and-execute.sh guest/ubuntu.server/ubuntu.server.code.sh"
    description: "ubuntu.server.code.sh"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 600

  - action: inputTextAndEnter
    text: "clear; exit;"
    description: "Exit back to login"
