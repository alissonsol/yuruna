# SSH-driven equivalent of gui/start.guest.amazon.linux.2023.yml. Selected
# automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# AL2023 boots a pre-installed cloud image (no subiquity installer), so unlike
# the Ubuntu SSH start there is no boot-menu OCR bridge -- straight to
# sshWaitReady. The harness SSH key is injected by
# host/vmconfig/amazon.linux.2023.base.user-data (users-block + top level), and
# key auth bypasses the cloud-init forced first-login password change, so the
# GUI console password dance (login/Password/Current/New/Retype + SetPassword)
# is dropped entirely. The update script self-sudoes per command, so it is
# invoked without a sudo prefix (matching the Ubuntu SSH start).
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 427653e6-932c-486a-b33f-0957edaa0ffa
sequenceRevision: 1

description: "Amazon Linux 2023 (SSH): drive everything over SSH once cloud-init has brought up sshd -- no console password dance (key auth bypasses the forced first-login change)."
baseline:
  amazon.linux.2023: []
variables:
  username: yauser1

steps:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd + authorized_keys"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/amazon.linux.2023/amazon.linux.2023.update.sh"
    timeoutSeconds: 1800
    description: "amazon.linux.2023.update.sh"

  - action: sshExec
    command: "sudo reboot now"
    allowFailure: true
    description: "Reboot the VM"
