# yaml-language-server: $schema=../../schemas/sequence.schema.yml

# Copyright (c) 2019-2026 by Alisson Sol et al.
# SSH-driven equivalent of gui/start.guest.ubuntu.server.24.yml. Selected
# automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# Subiquity runs fully hands-off via interactive-sections:[], so there is
# no Install-button dance — just one OCR step to dismiss GRUB, then
# SSH-wait for cloud-init to finish bringing up sshd.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42946cbc-c2ec-48e4-a4ba-8e25a71c1286
sequenceRevision: 1

description: "Ubuntu Server 24.04: OCR-dismiss GRUB, then drive everything else over SSH once cloud-init has finished bringing up sshd."
baseline:
  ubuntu.server.24: []
variables:
  username: yuuser24

steps:
  - action: waitForAndEnter
    pattern: "Try or Install Ubuntu Server"
    timeoutSeconds: 600
    text: ""
    description: "Try or Install Ubuntu Server"

  - action: sshWaitReady
    timeoutSeconds: 2400
    description: "Wait for SSH after autoinstall"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.24/ubuntu.server.24.update.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.24.update.sh"

  - action: sshExec
    command: "sudo reboot now"
    allowFailure: true
    description: "Reboot the VM"
