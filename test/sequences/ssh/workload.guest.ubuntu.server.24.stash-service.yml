# SSH-driven equivalent of gui/workload.guest.ubuntu.server.24.stash-service.yml.
# Selected automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# Authenticates as the key-bearing cloud-init user 'yuruna'
# (host/vmconfig/stash-service.base.user-data); the GUI sequence's console
# account 'ystash' is not key-provisioned. variables.username cascades into the
# baseline start sequence so the whole chain connects as yuruna.
# The deploy is the LAST step on purpose: ubuntu.server.24.stash-service.sh
# disables the OS sshd (ssh.service + ssh.socket) and rebinds :22 to the Yuruna
# Stash daemon, so the harness OpenSSH transport is gone the instant it
# succeeds -- any later sshExec/sshWaitReady would hit the stash protocol on :22,
# not OpenSSH, and hang or false-fail. Post-deploy asserts (systemctl is-active,
# ss -ltnp :22) live inside the fetched script.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 426483ed-7299-4b75-b280-ccb8c74ec993
sequenceRevision: 1

description: "Ubuntu Server 24.04 (SSH): bring up the Yuruna Stash Service daemon -- parallel path to the keystroke sequence."
baseline:
  ubuntu.server.24:
    - start.guest.ubuntu.server.24
variables:
  username: yuruna

steps:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.24/ubuntu.server.24.stash-service.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.24.stash-service.sh (LAST step: disables OS sshd + rebinds :22 to the stash daemon on success)"
