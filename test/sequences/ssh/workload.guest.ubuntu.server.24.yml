# yaml-language-server: $schema=../../schemas/sequence.schema.yml

# Copyright (c) 2019-2026 by Alisson Sol et al.
# SSH-driven equivalent of gui/workload.guest.ubuntu.server.24.yml. Selected
# automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42f51c93-670c-4995-9034-c06c275a357e
sequenceRevision: 1

description: "Ubuntu Server 24.04: install VS Code and verify — parallel path to the keystroke sequence."
baseline:
  ubuntu.server.24:
    - start.guest.ubuntu.server.24
variables:
  username: yuuser24

steps:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.24/ubuntu.server.24.code.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.24.code.sh"

  - action: sshExec
    command: "dpkg -l | grep -i 'code ' || true"
    allowFailure: true
    description: "Show installed VS Code package"
