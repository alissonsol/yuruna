# yaml-language-server: $schema=../../schemas/sequence.schema.yml

# SSH-driven equivalent of gui/workload.guest.ubuntu.server.yml. Selected
# automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# See possible actions in the actions.yml file.

description: "Ubuntu Server: install VS Code and verify — parallel path to the keystroke sequence."
baseline:
  ubuntu.server:
    - start.guest.ubuntu.server
variables:
  username: yuuser1

steps:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/automation/fetch-and-execute.sh guest/ubuntu.server/ubuntu.server.code.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.code.sh"

  - action: sshExec
    command: "dpkg -l | grep -i 'code ' || true"
    allowFailure: true
    description: "Show installed VS Code package"
