# SSH variant of workload.guest.amazon.linux.2023 (keystrokeMechanism: ssh).
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42450c58-14b7-4458-80f0-ac05c42761df
sequenceRevision: 1

description: "Amazon Linux 2023 (SSH): install the Desktop package group and verify."
keystrokeMechanism: ssh
resource:
  amazon.linux.2023:
    - start.guest.amazon.linux.2023.ssh
variables:
  username: yauser1

# component -- wait for sshd, smoke-test the session.
component:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

# workload -- install the Desktop group and verify.
workload:
  - action: sshFetchAndExecute
    command: 'sudo dnf groupinstall -y "Desktop"'
    timeoutSeconds: 1800
    description: "GUI install"

  - action: sshExec
    command: 'dnf list installed "*desktop*"'
    allowFailure: true
    description: "Show installed desktop packages"
