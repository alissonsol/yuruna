# SSH variant of workload.guest.ubuntu.server.26 (keystrokeMechanism: ssh).
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42bd1227-31bc-4c7d-96a0-406ce0baa7ab
sequenceRevision: 1

description: "Ubuntu Server 26.04 (SSH): install VS Code and verify."
keystrokeMechanism: ssh
resource:
  ubuntu.server.26:
    - start.guest.ubuntu.server.26.ssh
variables:
  username: yuuser26

# component -- wait for sshd, smoke-test the session.
component:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

# workload -- install VS Code and verify the package is present.
workload:
  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.26/ubuntu.server.26.code.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.26.code.sh"

  - action: sshExec
    command: "dpkg -l | grep -i 'code ' || true"
    allowFailure: true
    description: "Show installed VS Code package"
