# SSH variant of workload.guest.ubuntu.server.26.stash-service
# (keystrokeMechanism: ssh).
# Standalone SMOKE TEST of the stash daemon build + launch on a vanilla
# Ubuntu guest (no NAS seed -> local-fallback storage); NOT the production
# bring-up (Start-StashServer + cloud-init) and NOT wired into automated
# test-sets -- run it manually. See https://yuruna.link/stash-service.
# Authenticates as the key-bearing cloud-init user 'yuruna'
# (host/vmconfig/stash-service.base.user-data) -- the only account the
# stash VM provisions. variables.username cascades into the resource start
# sequence so the whole chain connects as yuruna (the GUI sequence uses the
# same account for console login).
# The deploy is the LAST step on purpose: ubuntu.server.26.stash-service.sh
# disables the OS sshd (ssh.service + ssh.socket) and rebinds :22 to the Yuruna
# Stash daemon, so the harness OpenSSH transport is gone the instant it
# succeeds -- any later sshExec/sshWaitReady would hit the stash protocol on :22,
# not OpenSSH, and hang or false-fail. Post-deploy asserts (systemctl is-active,
# ss -ltnp :22) live inside the fetched script.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 420b70c9-7921-4194-b84c-7569563c0131
sequenceRevision: 1

description: "Ubuntu Server 26.04 (SSH): bring up the Yuruna Stash Service daemon."
keystrokeMechanism: ssh
resource:
  ubuntu.server.26:
    - start.guest.ubuntu.server.26.ssh
variables:
  username: yuruna

# component -- wait for sshd, smoke-test the session.
component:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd after reboot"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

# workload -- build + launch the stash daemon (LAST step: disables OS sshd +
# rebinds :22 to the stash daemon on success).
workload:
  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.26/ubuntu.server.26.stash-service.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.26.stash-service.sh (LAST step: disables OS sshd + rebinds :22 to the stash daemon on success)"
