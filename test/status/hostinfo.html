<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover + safe-area-inset support; see yuruna.common.css. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="public, max-age=60, must-revalidate">
  <title>hostinfo — Yuruna</title>
  <link rel="stylesheet" href="yuruna.common.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    #banner-user-row {
      margin-left: auto;
      flex: 0 0 auto;
      font-size: .75rem;
      color: rgba(255,255,255,.92);
      background: transparent;
    }
    #banner-user {
      font-family: var(--font-mono);
      font-weight: 600;
    }

    main {
      flex: 1; max-width: 1100px; width: 100%; margin: 0 auto;
      padding: 1.25rem 1.5rem;
    }
    pre#hostinfo-output {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: .5rem;
      padding: 1rem 1.25rem;
      font-family: var(--font-mono); font-size: .75rem;
      line-height: 1.4;
      white-space: pre-wrap; word-break: break-word;
      color: var(--fg-primary);
    }
    pre#hostinfo-output.loading { color: var(--fg-faint); font-style: italic; }
    pre#hostinfo-output.error   { color: var(--fail-fg); background: var(--fail-soft-bg); border-color: var(--fail-soft-border); }
  </style>
</head>
<body>

<header class="page-header">
  <h1><span id="header-title">Yuruna</span><span id="header-version"></span></h1>
  <span id="header-machine"></span>
</header>

<div id="banner" class="idle">
  <span class="dot"></span>
  <span id="banner-text">Loading…</span>
  <span id="banner-user-row">User account: <span id="banner-user">—</span></span>
</div>

<main>
  <pre id="hostinfo-output" class="loading">Running Get-SystemDiagnostic on host…</pre>
</main>

<script src="yuruna.common.js"></script>

</body>
</html>
