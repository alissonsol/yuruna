<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuruna VDE Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb; color: #111827; font-size: 14px; line-height: 1.5;
      padding-bottom: 3rem;
    }

    /* ── Header ── */
    header {
      background: #111827; color: #fff;
      padding: 1.25rem 2rem;
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.02em; }
    header p  { color: #9ca3af; font-size: .875rem; }
    #header-machine {
      margin-left: auto; color: #9ca3af; font-size: .75rem;
      font-family: 'Menlo','Consolas',monospace;
    }

    /* ── Status banner ── */
    #banner {
      display: flex; align-items: center; gap: .625rem;
      padding: .9rem 2rem; font-weight: 600; font-size: .9375rem;
      transition: background .3s;
    }
    #banner.idle    { background: #6b7280; color: #fff; }
    #banner.running { background: #2563eb; color: #fff; }
    #banner.pass    { background: #16a34a; color: #fff; }
    #banner.fail    { background: #dc2626; color: #fff; }
    #banner.paused  { background: #ca8a04; color: #fff; }
    #banner .dot {
      width: .625rem; height: .625rem; border-radius: 50%;
      background: currentColor; display: inline-block; flex-shrink: 0;
    }
    #banner.running .dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* Banner controls (SSH toggle + Pause/Continue), right-aligned together */
    #banner-controls {
      margin-left: auto;
      display: flex;
      gap: .5rem;
    }
    .banner-btn {
      background: rgba(255,255,255,0.15);
      color: inherit;
      border: 1px solid rgba(255,255,255,0.35);
      padding: .3rem .75rem;
      border-radius: .375rem;
      font-weight: 600; font-size: .8125rem;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .banner-btn:hover:not([disabled]) { background: rgba(255,255,255,0.28); }
    .banner-btn[disabled] { cursor: default; opacity: .35; }

    /* ── Main container ── */
    main { max-width: 860px; margin: 1.75rem auto; padding: 0 1.5rem; }

    /* ── Section heading ── */
    .section-title {
      font-size: .6875rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: #6b7280;
      border-bottom: 1px solid #e5e7eb; padding-bottom: .4rem; margin-bottom: .875rem;
    }
    section { margin-bottom: 2rem; }

    /* ── Meta row ── */
    .meta-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem;
    }
    .meta-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: .5rem;
      padding: .75rem 1rem;
    }
    .meta-card .label { font-size: .6875rem; color: #9ca3af; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .2rem; }
    .meta-card .value { font-size: .75rem; font-weight: 500; font-family: 'Menlo','Consolas',monospace; color: #111827; word-break: break-all; }

    /* ── Guest card ── */
    .guest-card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: .5rem;
      padding: .875rem 1.125rem; margin-bottom: .625rem;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem;
    }
    .guest-card .left { flex: 1; min-width: 0; }
    .guest-name { font-weight: 600; font-size: .9375rem; margin-bottom: .2rem; }
    .guest-meta { font-size: .75rem; color: #6b7280; margin-bottom: .45rem; }
    .steps      { display: flex; flex-wrap: wrap; gap: .375rem; }
    .step-pill  {
      font-size: .6875rem; font-weight: 600; padding: .2rem .55rem; border-radius: 9999px;
      white-space: nowrap;
    }
    .guest-error {
      margin-top: .5rem; font-size: .75rem; color: #dc2626;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: .375rem; padding: .45rem .625rem;
      font-family: 'Menlo','Consolas',monospace; word-break: break-all;
    }
    .guest-action {
      margin-top: .5rem; font-size: .75rem; color: #1d4ed8;
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: .375rem; padding: .45rem .625rem;
      font-family: 'Menlo','Consolas',monospace; word-break: break-all;
    }
    /* When the sequence is paused, the guest-action box matches the banner's
       amber background so the pause state reads the same across both. */
    .guest-action.paused {
      background: #ca8a04; color: #fff; border-color: #a16207;
    }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: .3rem;
      font-size: .75rem; font-weight: 700; padding: .25rem .7rem;
      border-radius: 9999px; white-space: nowrap;
    }
    .badge::before {
      content: ''; display: inline-block;
      width: .45rem; height: .45rem; border-radius: 50%; background: currentColor;
    }

    /* Colours for badges & pills */
    .idle, .idle-bg     { background: #f3f4f6; color: #6b7280; }
    .pending, .pending-bg { background: #f3f4f6; color: #6b7280; }
    .running, .running-bg { background: #dbeafe; color: #1d4ed8; }
    .pass, .pass-bg     { background: #dcfce7; color: #16a34a; }
    .fail, .fail-bg     { background: #fee2e2; color: #dc2626; }
    .skipped, .skipped-bg { background: #fef9c3; color: #a16207; }
    .paused, .paused-bg { background: #fef3c7; color: #ca8a04; }

    /* ── History table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: .5rem; overflow: hidden; font-size: .8125rem;
    }
    th {
      background: #f9fafb; padding: .625rem 1rem; text-align: left;
      font-weight: 600; color: #374151; border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }
    td { padding: .625rem 1rem; border-bottom: 1px solid #f3f4f6; color: #374151; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9fafb; }
    .mono { font-family: 'Menlo','Consolas',monospace; font-size: .75rem; }

    /* ── No data ── */
    .no-data {
      text-align: center; padding: 3.5rem 1rem; color: #9ca3af;
    }
    .no-data h3 { font-size: 1.125rem; margin-bottom: .5rem; color: #6b7280; }
    .no-data code {
      background: #f3f4f6; padding: .125rem .375rem; border-radius: .25rem;
      font-family: 'Menlo','Consolas',monospace; font-size: .8125rem;
    }

    /* ── Footer bar ── */
    #footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #111827; color: #9ca3af; font-size: .6875rem;
      padding: .35rem 1rem; display: flex; justify-content: space-between;
      align-items: center; gap: 1rem;
    }
    /* IP list lives in a readonly textarea — up to two lines (IPv4 / IPv6),
       capped at 1/3 of the page width. Rows are set dynamically by JS to
       match the content line count (1 or 2), so the box never has vertical
       empty space — this is what makes the field visually centered on the
       footer row regardless of how many lines the file has.
       `overflow:auto` (not hidden) keeps the textarea's native scroll-on-
       caret behavior alive: clicking in and pressing End / arrow keys
       scrolls the clipped content into view. `scrollbar-width:none` +
       the ::-webkit-scrollbar rule below suppress the visible scrollbars
       so nothing is drawn until the user interacts. `resize:none` keeps
       the footer stable. */
    #footer-ips { flex: 0 1 33%; max-width: 33%; min-width: 0; display: flex; align-items: center; gap: .5rem; }
    #footer-ips .label { flex-shrink: 0; }
    textarea#footer-ip-list {
      flex: 1 1 auto; min-width: 0;
      font-family: 'Menlo','Consolas',monospace; font-size: .6875rem;
      color: #9ca3af; background: #0b1220; border: 1px solid #374151;
      border-radius: 3px; padding: .15rem .35rem;
      resize: none; overflow: auto; white-space: pre;
      line-height: 1.25; vertical-align: middle;
      scrollbar-width: none;
    }
    textarea#footer-ip-list::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Yuruna</h1>
  <span id="header-machine"></span>
</header>

<div id="banner" class="idle">
  <span class="dot"></span>
  <span id="banner-text">Loading…</span>
  <div id="banner-controls">
    <button id="ssh-btn" class="banner-btn" type="button" disabled>SSH</button>
    <button id="pause-btn" class="banner-btn" type="button" disabled>Pause</button>
  </div>
</div>

<main>

  <section id="sec-meta" style="display:none">
    <div class="section-title" id="sec-meta-title">Latest Cycle</div>
    <div class="meta-grid">
      <div class="meta-card"><div class="label">Cycle ID (UTC)</div><div class="value" id="m-cycleid">—</div></div>
      <div class="meta-card"><div class="label">Started (Local Time)</div><div class="value" id="m-started">—</div></div>
      <div class="meta-card"><div class="label">Commit</div><div class="value" id="m-commit">—</div></div>
      <div class="meta-card"><div class="label">Latest image refresh</div><div class="value" id="m-getimage">—</div></div>
    </div>
  </section>

  <section id="sec-guests" style="display:none">
    <div class="section-title">Guests</div>
    <div id="guest-list"></div>
  </section>

  <section id="sec-history" style="display:none">
    <div class="section-title">Recent Cycles</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Cycle ID (UTC)</th><th>Duration</th>
            <th>Commit</th><th>Guests</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </section>

  <div id="no-data" class="no-data">
    <h3>No test data yet</h3>
    <p>Run <code>Invoke-TestRunner.ps1</code> to start a test cycle.</p>
  </div>

</main>

<div id="footer-bar">
  <span id="footer-ips"><span class="label">IPs:</span><textarea id="footer-ip-list" readonly rows="1" spellcheck="false" aria-label="Host IP addresses">—</textarea></span>
  <span>Loaded: <span id="last-loaded">—</span></span>
  <span><a href="#" onclick="location.reload();return false" style="color:#6b7280">Refresh</a>: <span id="countdown">30</span>s</span>
</div>

<script>
  const BANNER = {
    idle:    'No test data available',
    running: 'Test in progress',
    pass:    'All guests operational',
    fail:    'Incident detected — see details below',
    paused:  'Test paused'
  };

  // Populate the footer with the host's IP addresses, written by
  // Start-StatusServer.ps1 to status/log/ipaddresses.txt. Fetched once
  // on load — the file only changes when the status server restarts,
  // and a browser reload picks that up. The "Connecting to localhost:…"
  // that used to live here is redundant with the URL bar.
  async function loadIpAddresses() {
    const el = document.getElementById('footer-ip-list');
    if (!el) return;
    try {
      const res = await fetch('log/ipaddresses.txt?_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      // Preserve the writer's two-line format (IPv4 on line 1, IPv6 on
      // line 2). Only trim trailing whitespace so a final \n doesn't
      // render as an empty third row inside the textarea.
      const text = (await res.text()).replace(/\s+$/, '');
      const value = text || '—';
      el.value = value;
      // Size the textarea to match its content so the field has no blank
      // vertical padding — this is what keeps it visually centered on
      // the footer row whether the file has 1 line ("No IP addresses
      // detected" or just IPv4) or 2 lines (IPv4 + IPv6).
      const lineCount = Math.min(2, Math.max(1, value.split('\n').length));
      el.rows = lineCount;
    } catch (e) {
      el.value = '—';
      el.rows = 1;
      console.warn('Could not load log/ipaddresses.txt:', e.message);
    }
  }
  // Raw HTML from status/log/proxy-cache.txt. The server rewrites this
  // file at the start of every test cycle (Start-StatusServer.ps1 runs
  // with -Restart from Invoke-TestRunner.ps1 on each cycle, and its
  // proxy-cache probe re-runs then). The UI re-fetches on every
  // loadStatus() poll so a page left open sees the new cycle's proxy
  // state without a manual reload.
  // Appended to the "Latest Cycle" section title (see renderStatus).
  // Declared before any init call so the loadProxyCacheText() invocation
  // below can't hit the temporal-dead-zone.
  let proxyCacheHtml = '';

  loadIpAddresses();
  // loadProxyCacheText() is called again inside loadStatus() on every
  // poll — this first call just populates proxyCacheHtml before the
  // first renderStatus fires so the section title has it immediately.
  loadProxyCacheText();

  function cls(status) {
    return ['idle','running','pass','fail','skipped','pending','paused'].includes(status) ? status : 'idle';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Write the banner text. The proxy-cache state used to live here but
  // was moved to the "Latest Cycle" section title (see renderStatus),
  // so this helper is now a plain text-setter.
  function setBannerText(statusText) {
    const el = document.getElementById('banner-text');
    if (!el) return;
    el.textContent = statusText || '';
  }

  // Refresh the "Latest Cycle" section title with proxy-cache HTML.
  // Split out from renderStatus so the first loadProxyCacheText() can
  // update the UI even before the first status.json poll lands.
  function refreshCycleTitle() {
    const el = document.getElementById('sec-meta-title');
    if (!el) return;
    // proxyCacheHtml is trusted server-generated HTML (may include an
    // <a href> to the cachemgr URL). "Latest Cycle" is a literal
    // constant so there's nothing to escape on the left side.
    el.innerHTML = proxyCacheHtml
      ? ('Latest Cycle - ' + proxyCacheHtml)
      : 'Latest Cycle';
  }

  async function loadProxyCacheText() {
    try {
      const res = await fetch('log/proxy-cache.txt?_=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      proxyCacheHtml = (await res.text()).trim();
    } catch (e) {
      proxyCacheHtml = '';
      console.warn('Could not load log/proxy-cache.txt:', e.message);
    }
    refreshCycleTitle();
  }

  // Update the Pause/Continue button label + enabled state based on
  // the effective banner state ('running'|'paused'|other).
  function updatePauseButton(effective) {
    const btn = document.getElementById('pause-btn');
    if (!btn) return;
    if (effective === 'paused') {
      btn.textContent = 'Continue';
      btn.disabled = false;
      btn.onclick = () => controlAction('resume');
    } else if (effective === 'running') {
      btn.textContent = 'Pause';
      btn.disabled = false;
      btn.onclick = () => controlAction('pause');
    } else {
      btn.textContent = 'Pause';
      btn.disabled = true;
      btn.onclick = null;
    }
  }

  // Post to the control endpoint, then force an immediate status refresh so
  // the banner flips to yellow (or back) without waiting for the 30s poll.
  async function controlAction(action) {
    const btn = document.getElementById('pause-btn');
    btn.disabled = true;
    try {
      await fetch('control/' + action, { method: 'POST', cache: 'no-store' });
    } catch (e) {
      console.warn('control ' + action + ' failed:', e.message);
    }
    loadStatus();
  }

  // SSH-toggle button: reflects sshd state and drives the enable/disable
  // endpoints. Three axes determine the final state:
  //   supported — host type has an implementation (false on host.macos.utm)
  //   installed — OpenSSH is present on the machine
  //   enabled   — sshd service is currently running
  // The button is DISABLED unless supported && installed. The admin must
  // run test/Start-SshServer.ps1 once to install; this UI only toggles the
  // service ON/OFF at runtime.
  function updateSshButton(state) {
    const btn = document.getElementById('ssh-btn');
    if (!btn) return;
    const supported = !!(state && state.supported);
    const installed = !!(state && state.installed);
    const enabled   = !!(state && state.enabled);
    if (!supported) {
      btn.textContent = 'SSH Server N/A';
      btn.disabled = true;
      btn.onclick = null;
      return;
    }
    if (!installed) {
      btn.textContent = 'SSH Server not installed';
      btn.disabled = true;
      btn.onclick = null;
      return;
    }
    if (enabled) {
      btn.textContent = 'Disable SSH Server';
      btn.onclick = () => sshAction('disable');
    } else {
      btn.textContent = 'Enable SSH Server';
      btn.onclick = () => sshAction('enable');
    }
    btn.disabled = false;
  }

  async function sshAction(action) {
    const btn = document.getElementById('ssh-btn');
    btn.disabled = true;
    const prevText = btn.textContent;
    btn.textContent = (action === 'enable') ? 'Enabling…' : 'Disabling…';
    let state = null;
    try {
      const res = await fetch('control/ssh/' + action, { method: 'POST', cache: 'no-store' });
      if (res.ok) state = await res.json();
    } catch (e) {
      console.warn('ssh ' + action + ' failed:', e.message);
    }
    if (state) {
      updateSshButton(state);
      if (!state.ok && state.message) console.warn('ssh ' + action + ': ' + state.message);
    } else {
      // Network error or non-200: restore the previous label and re-poll.
      btn.textContent = prevText;
      btn.disabled = false;
      loadSshStatus();
    }
  }

  async function loadSshStatus() {
    try {
      const res = await fetch('control/ssh/status', { cache: 'no-store' });
      if (res.ok) {
        const state = await res.json();
        updateSshButton(state);
        return;
      }
    } catch (e) {
      console.warn('ssh status fetch failed:', e.message);
    }
    // Couldn't reach the endpoint (old server binary, network blip) — keep
    // the button disabled with a neutral label.
    updateSshButton({ supported: false, enabled: false });
  }

  function badge(status, label) {
    const c = cls(status);
    return `<span class="badge ${c}">${label || status}</span>`;
  }

  function pill(step) {
    const c = cls(step.status);
    const skip = step.skipped ? ' (skip)' : '';
    const err  = step.errorMessage ? ` title="${step.errorMessage.replace(/"/g,'&quot;')}"` : '';
    return `<span class="step-pill ${c}"${err}>${step.name}${skip}</span>`;
  }

  function logFileUrl(cycleId, hostname, gitCommit) {
    if (!cycleId || !hostname || !gitCommit) return null;
    const safeCycleId = cycleId.replace(/:/g, '-');
    return 'log/' + safeCycleId + '.' + hostname + '.' + gitCommit + '.html';
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString(undefined, { dateStyle:'short', timeStyle:'short' });
  }

  function fmtDuration(a, b) {
    if (!a || !b) return '—';
    const s = Math.round((new Date(b) - new Date(a)) / 1000);
    if (s < 0) return '—';
    const m = Math.floor(s / 60), r = s % 60;
    return m ? (r ? `${m}m ${r}s` : `${m}m`) : `${s}s`;
  }

  // Return an HTML fragment for the "current action" line on a guest card,
  // or '' when there is nothing to show. The current-action.json sidecar is
  // written by Invoke-Sequence at each step boundary; we only surface it
  // on the guest whose key matches and while that guest is still running.
  // The box only picks up the amber paused variant once the running step
  // has actually ended and Invoke-Sequence has written the "Paused
  // (waiting for resume)" marker. While a step is still running after the
  // user clicks Pause, the banner is already amber but the action box
  // stays blue to signal "pause will take effect at the next step".
  function guestActionHtml(g, actionData, paused) {
    if (!actionData || !actionData.line) return '';
    if (g.status !== 'running') return '';
    if (actionData.guestKey && actionData.guestKey !== g.guestKey) return '';
    const safe = actionData.line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const waitingForResume = paused && /Paused \(waiting for resume\)/.test(actionData.line);
    const cls = waitingForResume ? 'guest-action paused' : 'guest-action';
    return `<div class="${cls}">${safe}</div>`;
  }

  function renderStatus(data, actionData) {
    const noData = document.getElementById('no-data');
    const banner = document.getElementById('banner');
    const headerMachine = document.getElementById('header-machine');

    // Update header with machine identity (always, even before run data)
    if (data && data.hostname) {
      const hostLabel = data.host ? data.host.replace('host.','') : '';
      headerMachine.textContent = data.hostname + (hostLabel ? ' (' + hostLabel + ')' : '');
      document.title = data.hostname + ' — Yuruna status';
    } else {
      headerMachine.textContent = window.location.hostname || '';
    }

    // status.json persists across rename (the rename was recent — any file
    // written before it still carries the old `runId` key instead of
    // `cycleId`). Read either so the page renders the same whether the file
    // pre-dates or post-dates the rename; new writes always go to cycleId,
    // so this fallback quietly ages out once every guest has recycled.
    const liveCycleId = data && (data.cycleId || data.runId);

    if (!data || (!liveCycleId && !data.guests?.length && !data.history?.length)) {
      banner.className = 'idle';
      setBannerText(BANNER.idle);
      updatePauseButton('idle');
      ['sec-meta','sec-guests','sec-history'].forEach(id => document.getElementById(id).style.display = 'none');
      noData.style.display = '';
      return;
    }
    noData.style.display = 'none';

    const status = data.overallStatus || 'idle';
    const paused = !!data.paused;
    // When paused, the banner shows yellow + "Test run paused" regardless of
    // the underlying overallStatus. The Pause/Continue button is driven by
    // the same effective state.
    const effective = paused ? 'paused' : cls(status);
    banner.className = effective;
    setBannerText(paused ? BANNER.paused : (BANNER[status] || status));
    updatePauseButton(effective);

    // Meta
    if (liveCycleId) {
      document.getElementById('sec-meta').style.display = '';
      document.getElementById('m-commit').textContent   = (data.gitCommit || '—').slice(0, 12);
      const cycleIdLabel = (liveCycleId || '—').slice(0, 19);
      const cycleLogUrl  = logFileUrl(liveCycleId, data.hostname, data.gitCommit);
      const cycleCell = cycleLogUrl
        ? `<a href="${cycleLogUrl}" target="_blank" style="color:inherit;text-decoration:underline dotted">${cycleIdLabel}</a>`
        : cycleIdLabel;
      document.getElementById('m-cycleid').innerHTML = `<span class="badge ${cls(status)}">${cycleCell}</span>`;
      document.getElementById('m-started').textContent  = fmtDate(data.startedAt);
      document.getElementById('m-getimage').textContent = data.lastGetImageAt ? fmtDate(data.lastGetImageAt) : 'never';
    }

    // Guests
    const guests = data.guests || [];
    if (guests.length) {
      document.getElementById('sec-guests').style.display = '';
      document.getElementById('guest-list').innerHTML = guests.map(g => {
        const steps  = (g.steps || []).map(pill).join('');
        const dur    = fmtDuration(g.steps?.[0]?.startedAt, g.steps?.slice(-1)[0]?.finishedAt);
        const errHtml = g.steps?.find(s => s.errorMessage)
          ? `<div class="guest-error">${g.steps.find(s=>s.errorMessage).errorMessage}</div>` : '';
        const actHtml = guestActionHtml(g, actionData, paused);
        return `<div class="guest-card">
          <div class="left">
            <div class="guest-name">${g.guestKey}</div>
            <div class="guest-meta">${g.vmName ? 'VM: '+g.vmName+' · ' : ''}${dur !== '—' ? 'Duration: '+dur : ''}</div>
            <div class="steps">${steps}</div>
            ${actHtml}
            ${errHtml}
          </div>
          <div>${badge(g.status)}</div>
        </div>`;
      }).join('');
    }

    // History
    const history = data.history || [];
    if (history.length) {
      document.getElementById('sec-history').style.display = '';
      document.getElementById('history-body').innerHTML = history.map(h => {
        const gs = h.guestSummary || {};
        const guestPills = Object.entries(gs).map(([k, v]) =>
          `<span class="badge ${cls(v)}" style="font-size:.625rem;padding:.15rem .4rem">${k.replace('guest.','')}</span>`
        ).join(' ');
        // History entries written before the rename still have `runId`;
        // read either field so old persisted rows remain clickable. New
        // writes use `cycleId`; within ~30 cycles the fallback is moot.
        const hCycleId = h.cycleId || h.runId;
        const hLogUrl = logFileUrl(hCycleId, h.hostname, h.gitCommit);
        const hCycleLabel = (hCycleId||'—').slice(0,19);
        const hCycleCell = hLogUrl
          ? `<a href="${hLogUrl}" target="_blank" style="color:inherit;text-decoration:underline dotted">${hCycleLabel}</a>`
          : hCycleLabel;
        const statusCls = cls(h.overallStatus);
        return `<tr>
          <td class="mono"><span class="badge ${statusCls}">${hCycleCell}</span></td>
          <td>${fmtDuration(h.startedAt, h.finishedAt)}</td>
          <td class="mono">${h.gitCommit && data.repoUrl
            ? `<a href="${data.repoUrl}/commit/${h.gitCommit}" target="_blank" style="color:inherit;text-decoration:underline dotted">${h.gitCommit.slice(0,8)}</a>`
            : (h.gitCommit||'—').slice(0,8)}</td>
          <td>${guestPills}</td>
        </tr>`;
      }).join('');
    }
  }

  let countdown = 30;

  async function loadStatus() {
    let data = null;
    let actionData = null;
    try {
      const res  = await fetch('status.json?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      data = await res.json();
    } catch (e) {
      console.warn('Could not load status.json:', e.message);
    }
    try {
      // Soft fetch — 404 is normal when no sequence has run yet.
      const aRes = await fetch('current-action.json?_=' + Date.now());
      if (aRes.ok) actionData = await aRes.json();
    } catch (e) { /* ignored: current-action.json is optional */ }
    renderStatus(data, actionData);
    document.getElementById('last-loaded').textContent = new Date().toLocaleTimeString();
    countdown = 30;
    // Also refresh the SSH-toggle button on every poll so that changes made
    // outside this tab (another admin running Start-SshServer, the service
    // crashing, etc.) show up without needing a full page reload. Fire-and-
    // forget — loadSshStatus handles its own errors.
    loadSshStatus();
    // Re-read proxy-cache.txt every poll. Start-StatusServer.ps1 rewrites
    // it at the beginning of every test cycle (Invoke-TestRunner runs
    // it with -Restart, which re-triggers the Test-ProxyCacheAvailable
    // probe), so the UI picks up a new cycle's cache state within one
    // poll interval even if the page was left open across cycles.
    loadProxyCacheText();
  }

  setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    document.getElementById('countdown').textContent = countdown;
    if (countdown === 0) loadStatus();
  }, 1000);

  loadStatus();
</script>

</body>
</html>
