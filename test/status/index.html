<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover lets the header background extend under the iPhone
       notch / home-indicator; safe-area-inset padding in yuruna.common.css
       keeps content readable on notched devices. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="public, max-age=60, must-revalidate">
  <title>Yuruna Status</title>
  <link rel="stylesheet" href="yuruna.common.css">
  <style>
    /* Reserve space for the fixed footer bar. The plain value is the fallback
       (kept for parsers without env() support); the env() term additionally
       clears the iPhone home-indicator inset when viewport-fit=cover lets the
       fixed bar extend under it (0 on devices without a safe area). */
    body { padding-bottom: 3rem; padding-bottom: calc(3rem + env(safe-area-inset-bottom)); }

    #banner-dash-row {
      margin-left: auto; flex: 0 0 auto;
      font-size: .75rem;
      background: transparent;
    }
    #banner-dash,
    #banner-dash-noproxy {
      color: rgba(255,255,255,.92);
    }
    #banner-dash { text-decoration: underline dotted; }
    #banner-dash:hover { text-decoration: underline; }

    /* .section-title / .meta-btn / .no-data chrome lives in
       yuruna.common.css (shared with perf.html). The per-id rules
       below pin flex behavior that's unique to index.html's
       three-section layout. */
    .section-title.with-controls #sec-cycle-title,
    .section-title.with-controls #sec-sequences-title,
    .section-title.with-controls #sec-history-title {
      font-size: .6875rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--fg-muted);
      flex: 1 1 auto; min-width: 0;
    }

    main { max-width: 860px; width: 100%; margin: 1.75rem auto; padding: 0 1.5rem; }
    section { margin-bottom: 2rem; }

    .meta-grid {
      display: flex; flex-wrap: wrap;
    }
    .guest-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: .5rem;
      padding: .875rem 1.125rem; margin-bottom: .625rem;
    }
    .guest-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .guest-card-header > * + * { margin-left: 1rem; }
    .guest-card-header .left { flex: 1; min-width: 0; }
    .guest-name { font-weight: 600; font-size: .9375rem; margin-bottom: .2rem; }
    .guest-meta { font-size: .75rem; color: var(--fg-muted); margin-bottom: .45rem; }
    .guest-toplevel {
      font-size: .75rem; color: var(--link-strong); margin-bottom: .45rem;
      font-family: var(--font-mono); word-break: break-all;
    }
    .steps      { display: flex; flex-wrap: wrap; }
    .steps > .step-pill { margin-right: .375rem; margin-bottom: .375rem; }
    .step-pill  {
      font-size: .6875rem; font-weight: 600; padding: .2rem .55rem; border-radius: 9999px;
      white-space: nowrap;
    }
    .guest-error {
      margin-top: .5rem; font-size: .75rem; color: var(--fail-fg);
      background: var(--fail-soft-bg); border: 1px solid var(--fail-soft-border);
      border-radius: .375rem; padding: .45rem .625rem;
      font-family: var(--font-mono); word-break: break-all;
    }
    .guest-action {
      margin-top: .5rem; font-size: .75rem; color: var(--info-fg);
      background: var(--info-bg); border: 1px solid var(--info-border);
      border-radius: .375rem; padding: .45rem .625rem;
      font-family: var(--font-mono); word-break: break-all;
    }
    .guest-action.paused {
      background: var(--paused-strong-bg); color: var(--fg-header); border-color: var(--paused-strong-border);
    }

    /* A sequence card is the visual unit for one test.runner.yml entry; it
       wraps the guest(s) that sequence drives. The nested guest blocks drop
       their own card chrome (see .sequence-card .guest-card below) so the
       sequence card reads as a single tile even with one guest. */
    .sequence-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: .5rem;
      padding: .875rem 1.125rem; margin-bottom: .75rem;
    }
    .sequence-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: .5rem;
    }
    .sequence-card-header > * + * { margin-left: 1rem; }
    .sequence-name {
      flex: 1; min-width: 0;
      font-weight: 600; font-size: .9375rem; word-break: break-all;
      font-family: var(--font-mono); color: var(--fg-primary);
    }
    .sequence-card .guest-card {
      background: transparent; border: none; border-radius: 0;
      padding: 0; margin: 0;
    }
    .sequence-card .guest-card + .guest-card {
      margin-top: .625rem; padding-top: .625rem; border-top: 1px solid var(--border-soft);
    }
    /* Demote the guest key inside a sequence card to a sub-label — the
       sequence name is the card's primary title. */
    .sequence-card .guest-name { font-size: .8125rem; font-weight: 500; }

    /* Flexbox fallback for iOS 9 Safari (pre-grid). Each card claims
       half the row minus the inter-card gutter; the flex-wrap lets a
       narrow viewport stack them. */
    .meta-grid > .meta-card { width: -webkit-calc(50% - .1875rem); width: calc(50% - .1875rem); margin-bottom: .375rem; }
    .meta-grid > .meta-card:nth-child(odd) { margin-right: .375rem; }

    @supports (display: grid) {
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        -webkit-column-gap: .375rem; column-gap: .375rem;
        -webkit-row-gap: .375rem;    row-gap: .375rem;
      }
      .meta-grid > .meta-card,
      .meta-grid > .meta-card:nth-child(odd) {
        width: auto; margin-right: 0; margin-bottom: 0;
      }
    }

    .meta-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: .5rem;
      padding: .15rem 1rem;
    }
    .meta-card .label { font-size: .625rem; color: var(--fg-faint); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .1rem; }
    .meta-card .value { font-size: .6875rem; font-weight: 500; font-family: var(--font-mono); color: var(--fg-primary); word-break: break-all; }

    .badge {
      display: inline-flex; align-items: center;
      font-size: .75rem; font-weight: 700; padding: .25rem .7rem;
      border-radius: 9999px; white-space: nowrap;
    }
    #history-body .badge {
      font-size: .625rem; padding: .15rem .4rem;
      font-weight: 400; font-family: var(--font-mono);
    }
    #cycle-timestamp .badge { font-weight: 400; }

    .idle, .idle-bg     { background: var(--bg-hover); color: var(--fg-muted); }
    .pending, .pending-bg { background: var(--bg-hover); color: var(--fg-muted); }
    .running, .running-bg { background: var(--running-bg); color: var(--running-fg); }
    .pass, .pass-bg     { background: var(--pass-bg); color: var(--pass-fg); }
    .fail, .fail-bg     { background: var(--fail-bg); color: var(--fail-fg); }
    .skipped, .skipped-bg { background: var(--skipped-bg); color: var(--skipped-fg); }
    .paused, .paused-bg { background: var(--pending-bg); color: var(--pending-fg); }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: .5rem; overflow: hidden; font-size: .8125rem;
    }
    th {
      background: var(--bg-primary); padding: .625rem 1rem; text-align: left;
      font-weight: 600; color: var(--fg-primary); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: .625rem 1rem; border-bottom: 1px solid var(--border-soft); color: var(--fg-primary); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--bg-hover); }
    .mono { font-family: var(--font-mono); font-size: .75rem; }

    #footer-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--footer-bg); color: var(--footer-fg); font-size: .6875rem;
      padding: .35rem 1rem;
      /* Lift the controls above the iPhone home-indicator gesture bar; the bar
         is fixed to bottom:0 and viewport-fit=cover lets it sit under it. */
      padding-bottom: calc(.35rem + env(safe-area-inset-bottom));
      display: flex; justify-content: space-between;
      align-items: center;
    }
    #footer-bar a { color: var(--footer-fg); }
    #footer-ips { flex: 0 1 33%; max-width: 33%; min-width: 0; display: flex; align-items: center; }
    #footer-ips > * + * { margin-left: .5rem; }
    #footer-ips .label { flex-shrink: 0; }
    textarea#footer-ip-list {
      flex: 1 1 auto; min-width: 0;
      font-family: var(--font-mono); font-size: .6875rem;
      color: var(--footer-fg); background: var(--footer-input-bg); border: 1px solid var(--footer-input-border);
      border-radius: 3px; padding: .15rem .35rem;
      resize: none; overflow: auto; white-space: pre;
      line-height: 1.25; vertical-align: middle;
      scrollbar-width: none;
    }
    textarea#footer-ip-list::-webkit-scrollbar { display: none; }

    /* Phone-class viewport: footer-bar gutters tighten further than the
       shared .css max-width: 600px block does; #footer-ips claims its
       own row so the IP textarea is legible at 320 px. */
    @media (max-width: 600px) {
      /* The footer wraps to two rows here (#footer-ips claims its own full-width
         row), so the bar is taller than the single-row default reserve and would
         otherwise overlap the bottom of the history table. Enlarge the body
         bottom reserve to clear both rows; the plain value is the fallback and
         the env() term keeps the same home-indicator inset as the wide layout. */
      body { padding-bottom: 4.5rem; padding-bottom: calc(4.5rem + env(safe-area-inset-bottom)); }
      #footer-bar { padding-left: .5rem; padding-right: .5rem; flex-wrap: wrap; }
      #footer-ips { flex-basis: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <h1><span id="header-title">Yuruna</span><span id="header-version"></span></h1>
  <span id="header-machine"></span>
</header>

<div id="banner" class="idle">
  <span class="dot"></span>
  <span id="banner-text">Loading…</span>
  <span id="banner-dash-row">
    <a id="banner-dash" class="hidden" href="#" target="_blank" rel="noopener">Dashboards</a><span id="banner-dash-noproxy" class="hidden">No dashboard server</span>
  </span>
</div>

<main>

  <section id="sec-cycle" style="display:none">
    <div class="section-title with-controls">
      <span id="sec-cycle-title">Latest Cycle</span>
      <button id="cycle-pause-btn" class="meta-btn" type="button" disabled>Pause after cycle</button>
    </div>
    <div class="meta-grid">
      <div class="meta-card"><div class="label">Cycle ID (UTC)</div><div class="value" id="cycle-timestamp">—</div></div>
      <div class="meta-card"><div class="label">Started</div><div class="value" id="cycle-started">—</div></div>
      <div class="meta-card"><div class="label">Commit</div><div class="value" id="cycle-commit">—</div></div>
      <div class="meta-card"><div class="label">Images refresh</div><div class="value" id="cycle-images-refresh">—</div></div>
    </div>
    <!-- Classified failure cause for the live cycle; populated/shown by renderStatus from data.lastFailure. -->
    <div id="cycle-failure" class="cycle-failure" style="display:none"></div>
  </section>

  <section id="sec-sequences" style="display:none">
    <div class="section-title with-controls">
      <span id="sec-sequences-title">Test sequences</span>
      <button id="step-pause-btn" class="meta-btn" type="button" disabled>Pause after step</button>
    </div>
    <div id="sequence-list"></div>
  </section>

  <section id="sec-history" style="display:none">
    <div class="section-title with-controls">
      <span id="sec-history-title">Recent Cycles</span>
      <a class="section-title-link" href="perf.html">Performance</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th scope="col">Cycle ID (UTC)</th><th scope="col">Duration</th>
            <th scope="col">Sequences</th><th scope="col">Commit</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </section>

  <div id="no-data" class="no-data">
    <h3>No test data yet</h3>
    <p>Run <code>Invoke-TestRunner.ps1</code> to start a test cycle.</p>
  </div>

</main>

<div id="footer-bar">
  <span id="footer-ips"><span class="label">IPs:</span><textarea id="footer-ip-list" readonly rows="1" spellcheck="false" inputmode="none" autocorrect="off" autocapitalize="off" aria-label="Host IP addresses">—</textarea></span>
  <span>Loaded: <span id="last-loaded">—</span></span>
  <span><a id="footer-refresh" href="#">Refresh</a>: <span id="countdown">60</span>s</span>
</div>

<script src="yuruna.common.js"></script>

</body>
</html>
