<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover + safe-area-inset support; see yuruna.common.css. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="public, max-age=60, must-revalidate">
  <title>Perf — Yuruna</title>
  <link rel="stylesheet" href="yuruna.common.css">
  <style>
    /* dvh first-class, vh as the fallback: iOS Safari's 100vh is the large
       viewport, so the last flex child sits below the fold until the toolbars
       retract. */
    body { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }

    #perf-recalc {
      margin-left: auto;
      flex: 0 0 auto;
      border-radius: .375rem;
      font-weight: 600;
      font-family: inherit; cursor: pointer;
      background: var(--banner-overlay-bg); color: var(--fg-header);
      border: 1px solid var(--banner-overlay-border);
    }
    #perf-recalc:hover:not([disabled]) { background: var(--banner-overlay-hover-bg); }
    #perf-recalc[disabled] { cursor: default; opacity: .55; }

    main {
      flex: 1; max-width: 1100px; width: 100%; margin: 0 auto;
      padding: 1.25rem 1.5rem;
    }

    /* Narrow viewport: drop the 1100 px cap to full-width and trim
       side padding. Shared common.css handles the SVG aspect-ratio
       scaling (width:100%; height:auto via the viewBox) and the banner
       narrow-viewport padding. */
    @media (max-width: 600px) {
      main { padding: 1rem .75rem; }
      .seq-card { padding: .75rem .85rem; }

      /* The chart is 760 viewBox units wide. Scaled to a ~324px card on a
         375px phone that is a 0.43 factor, so the 9px baked-in labels paint at
         under 4px -- unreadable on exactly the touch devices they exist for
         (there is no hover <title> fallback there). Pin a min-width and let the
         row pan horizontally instead of shrinking the text into illegibility. */
      .cycle-rows { overflow-x: auto; }
      .cycle-flame { min-width: 560px; }
    }

    .perf-message {
      font-size: .75rem; color: var(--fg-muted); margin-bottom: 1.25rem;
      font-family: var(--font-mono);
    }
    .perf-message.error { color: var(--fail-fg); }

    .seq-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: .5rem;
      padding: .875rem 1.125rem; margin-bottom: 1rem;
    }
    .seq-name {
      font-weight: 600; font-size: .875rem;
      font-family: var(--font-mono);
      color: var(--fg-primary); margin-bottom: .15rem;
    }
    .seq-meta {
      font-size: .6875rem; color: var(--fg-muted); margin-bottom: .65rem;
    }
    /* Each cycle is one row: a clickable timestamp + wall-clock duration,
       then the cycle's horizontal icicle below it. All rows in a card share
       one x-scale (CHART_W viewBox units) so a slower cycle's bar reads as
       wider; each SVG scales to the card width via its viewBox. */
    .cycle-rows { margin-top: .15rem; }
    .cycle-row  { margin-bottom: .45rem; }
    .cycle-row-head {
      display: flex; align-items: baseline; justify-content: space-between;
      font-family: var(--font-mono); font-size: .6875rem; margin-bottom: .1rem;
    }
    .cycle-link { color: var(--link-strong); text-decoration: underline dotted; }
    .cycle-link.nolink { color: var(--fg-muted); text-decoration: none; cursor: default; }
    .cycle-dur { color: var(--fg-muted); }
    .cycle-dur.fail { color: var(--fail-fg); font-weight: 600; }
    .cycle-flame { width: 100%; height: auto; display: block; }
    .cycle-flame .flame-cell          { stroke: rgba(0,0,0,.22); stroke-width: .5; }
    .cycle-flame .flame-cell.ckpt     { stroke: rgba(255,255,255,.55); stroke-width: .5; }
    .cycle-flame .flame-cell.fail     { stroke: var(--fail-fg); stroke-width: 1.5; }
    .cycle-flame .flame-cell.fallback { fill: var(--border-input); stroke: var(--fg-muted); stroke-width: .5; }
    /* Dark glyphs with a white halo (paint-order: stroke draws the halo
       behind the fill) stay legible on any palette colour — and on touch
       devices, which never get the hover <title> tooltip. */
    .cycle-flame .flame-label {
      fill: #1b1b1b; font-size: 9px; font-family: var(--font-mono);
      paint-order: stroke; stroke: rgba(255,255,255,.85); stroke-width: 2px;
      stroke-linejoin: round; pointer-events: none;
    }
    .axis-row { margin-top: .1rem; }
    .cycle-flame .flame-axis-line { stroke: var(--fg-faint); stroke-width: 1; }
    .cycle-flame .flame-axis-text { fill: var(--fg-muted); font-size: 9px; font-family: var(--font-mono); }

    .stale-banner {
      background: var(--warn-bg); color: var(--warn-fg);
      border: 1px solid var(--pending-bg); border-radius: .375rem;
      padding: .65rem .85rem;
      font-size: .75rem; line-height: 1.5;
      margin-bottom: 1rem;
    }
    .stale-banner code {
      background: rgba(0,0,0,.06); padding: .05rem .3rem;
      border-radius: .2rem; font-family: var(--font-mono);
    }
    /* .no-data lives in yuruna.common.css (shared with index.html). */
  </style>
</head>
<body>

<header class="page-header">
  <h1><span id="header-title">Yuruna</span><span id="header-version"></span></h1>
  <span id="header-machine"></span>
</header>

<div id="banner" class="idle">
  <span class="dot"></span>
  <span id="banner-text">Loading…</span>
  <button id="perf-recalc" type="button" title="Re-scan test/status/perf/cycles/*.jsonl and refresh every chart.">Recalculate</button>
</div>

<main>
  <div id="perf-message" class="perf-message">Loading perf aggregates…</div>
  <div id="perf-body"></div>
</main>

<script src="yuruna.common.js"></script>

</body>
</html>
