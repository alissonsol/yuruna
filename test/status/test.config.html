<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover + safe-area-inset support; see yuruna.common.css. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="public, max-age=60, must-revalidate">
  <title>test.config.yml — Yuruna</title>
  <link rel="stylesheet" href="yuruna.common.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    main {
      flex: 1; overflow-y: auto;
      max-width: 880px; width: 100%; margin: 0 auto;
      padding: 1.25rem 1.5rem;
      font-family: var(--font-mono);
      font-size: .8125rem;
    }

    #config-status {
      padding: .5rem 1.5rem;
      font-size: .75rem;
      border-top: 1px solid var(--border);
      min-height: 2rem;
      background: var(--bg-elevated);
      color: var(--fg-muted);
    }
    #config-status.error { color: var(--fail-fg); background: var(--fail-soft-bg); }
    #config-status.ok    { color: var(--pass-fg); background: var(--pass-bg); }

    #config-footer {
      padding: .75rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      background: var(--bg-elevated);
    }
    #config-footer > * + * { margin-left: .5rem; }
    #config-footer > #config-discard { margin-left: auto; }
    .config-btn {
      border-radius: .375rem;
      font-weight: 600;
      font-family: inherit; cursor: pointer;
      border: 1px solid transparent;
    }
    .config-btn.primary {
      background: var(--primary-bg); color: var(--fg-header);
      border-color: var(--primary-border);
    }
    .config-btn.primary:hover:not([disabled]) { background: var(--primary-hover-bg); }
    .config-btn.primary[disabled] { background: var(--primary-disabled-bg); cursor: default; }
    .config-btn.secondary {
      background: var(--meta-btn-bg); color: var(--meta-btn-fg);
      border-color: var(--meta-btn-border);
    }
    .config-btn.secondary:hover { background: var(--meta-btn-hover-bg); }
    .config-btn.destructive {
      background: var(--destructive-bg); color: var(--fg-header);
      border-color: var(--destructive-border);
    }
    .config-btn.destructive:hover:not([disabled]) { background: var(--destructive-hover-bg); }
    .config-btn.destructive[disabled] { background: var(--destructive-disabled-bg); cursor: default; }

    .tree-node { margin: .15rem 0; }
    .tree-row {
      display: flex; align-items: center;
      padding: .15rem .25rem;
    }
    .tree-row > * + * { margin-left: .5rem; }
    .tree-row:hover { background: var(--bg-hover); }
    .tree-toggle {
      width: 1rem; flex-shrink: 0; cursor: pointer;
      color: var(--fg-muted);
      -webkit-user-select: none;
         -moz-user-select: none;
          -ms-user-select: none;
              user-select: none;
      text-align: center;
    }
    .tree-toggle.leaf { cursor: default; visibility: hidden; }
    .tree-key {
      color: var(--info-fg); flex-shrink: 0;
      min-width: 9rem;
    }
    .tree-key.array-index { color: var(--fg-muted); }
    .tree-key.array-index.narrow { min-width: 2.5rem; }
    .tree-type {
      color: var(--fg-faint); font-size: .6875rem;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .tree-children {
      margin-left: 1.25rem;
      border-left: 1px dashed var(--border);
      padding-left: .5rem;
    }
    .tree-children.collapsed { display: none; }

    .tree-array-delete {
      flex-shrink: 0;
      background: transparent; color: var(--fg-faint);
      border: 1px solid transparent; border-radius: .25rem;
      width: 1.4rem; height: 1.4rem; padding: 0;
      font-size: .75rem; line-height: 1; cursor: pointer;
      font-family: inherit;
    }
    .tree-array-delete:hover {
      background: var(--fail-bg); color: var(--fail-fg); border-color: var(--fail-soft-border);
    }
    .tree-array-add {
      margin: .25rem 0;
      background: transparent; color: var(--info-fg);
      border: 1px dashed var(--info-border); border-radius: .25rem;
      padding: .15rem .5rem;
      font-size: .75rem; cursor: pointer;
      font-family: inherit;
    }
    .tree-array-add:hover {
      background: var(--info-bg); border-style: solid;
    }

    .tree-input {
      flex: 1; min-width: 0;
      font-family: inherit; font-size: .8125rem;
      padding: .2rem .4rem;
      border: 1px solid var(--border-input); border-radius: .25rem;
      background: var(--bg-elevated); color: var(--fg-primary);
    }
    .tree-input:focus {
      outline: 2px solid var(--info-strong); outline-offset: -1px;
      border-color: transparent;
    }
    .tree-input.string { font-family: var(--font-mono); }
    .tree-input.number { width: 8rem; flex: 0 0 auto; }
    .tree-input.invalid-ip {
      border-color: var(--fail-fg);
      background: var(--fail-soft-bg);
    }
    .tree-input.invalid-ip:focus {
      outline-color: var(--fail-fg);
    }
    .cache-ip-wrap {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      gap: .25rem;
    }
    .cache-ip-envrow {
      display: flex; align-items: center; gap: .5rem;
      font-size: .75rem;
    }
    .cache-ip-envlabel {
      color: var(--fg-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
    }
    .tree-input.cache-ip-envinput {
      background: var(--bg-hover);
      color: var(--fg-muted);
      cursor: default;
    }
    .tree-input.cache-ip-envinput:focus { outline: none; }
    .cache-ip-input-row {
      display: flex; align-items: center; gap: .4rem;
    }
    .cache-ip-mark {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.25rem; height: 1.25rem;
      font-size: .9rem; font-weight: 700;
      font-family: var(--font-mono);
      line-height: 1;
      cursor: help;
      user-select: none;
    }
    .cache-ip-mark.ok       { color: var(--pass-fg); }
    .cache-ip-mark.fail     { color: var(--fail-fg); }
    .cache-ip-mark.disabled { color: var(--fg-faint); }
    .cache-ip-mark.pending  { color: var(--warn-fg); animation: cache-ip-pulse 1.1s ease-in-out infinite; }
    @keyframes cache-ip-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .45; }
    }
    .tree-input[disabled] {
      background: var(--bg-hover); color: var(--fg-muted);
      cursor: progress;
    }
    .ydd {
      position: relative;
      display: inline-flex; align-items: center;
      flex: 0 0 auto;
      font-family: var(--font-mono);
      font-size: .8125rem;
      padding: .2rem 1.5rem .2rem .4rem;
      border: 1px solid var(--border-input); border-radius: .25rem;
      background: var(--bg-elevated); color: var(--fg-primary);
      cursor: pointer;
      -webkit-user-select: none;
         -moz-user-select: none;
          -ms-user-select: none;
              user-select: none;
    }
    .ydd:focus { outline: 2px solid var(--info-strong); outline-offset: -1px; border-color: transparent; }
    .ydd-current { white-space: nowrap; }
    .ydd-current.ydd-stale { color: var(--fg-faint); font-style: italic; }
    .ydd-arrow {
      position: absolute; right: .4rem; top: 50%;
      margin-top: -.5rem; height: 1rem; line-height: 1rem;
      color: var(--fg-muted); font-size: .65rem;
      pointer-events: none;
    }
    .ydd-menu {
      position: absolute; top: 100%; left: 0;
      z-index: 100;
      background: var(--bg-elevated);
      border: 1px solid var(--border-input); border-radius: .25rem;
      box-shadow: 0 4px 8px rgba(0,0,0,.08);
      margin-top: .15rem;
      max-height: 14rem; overflow-y: auto;
      min-width: 100%;
    }
    .ydd-menu[hidden] { display: none; }
    .ydd-item {
      padding: .2rem .6rem;
      cursor: pointer; white-space: nowrap;
    }
    .ydd-item.is-active, .ydd-item:hover {
      background: var(--info-bg); color: var(--info-fg);
    }
    .ydd-item.is-selected { font-weight: 600; }
    .ydd-item.is-disabled {
      color: var(--fg-faint); font-style: italic; cursor: default;
    }
    .ydd-item.is-disabled:hover { background: transparent; color: var(--fg-faint); }

    .tree-bool {
      display: inline-flex; align-items: center;
    }
    .tree-bool > * + * { margin-left: .5rem; }
    .tree-bool-switch {
      position: relative; display: inline-block;
      width: 2.4rem; height: 1.2rem;
    }
    .tree-bool-switch input {
      opacity: 0; width: 0; height: 0;
    }
    .tree-bool-track {
      position: absolute; cursor: pointer;
      top: 0; right: 0; bottom: 0; left: 0;
      background: var(--border-input); border-radius: 1.2rem;
      transition: background .15s;
    }
    .tree-bool-track::before {
      content: ''; position: absolute;
      width: .9rem; height: .9rem; left: .15rem; bottom: .15rem;
      background: var(--bg-elevated); border-radius: 50%;
      -webkit-transition: -webkit-transform .15s;
              transition:         transform .15s;
    }
    .tree-bool-switch input:checked + .tree-bool-track {
      background: var(--pass-fg);
    }
    .tree-bool-switch input:checked + .tree-bool-track::before {
      -webkit-transform: translateX(1.2rem);
              transform: translateX(1.2rem);
    }
    .tree-bool-label {
      font-weight: 600; min-width: 3rem;
      color: var(--fg-muted);
    }
    .tree-bool-label.true  { color: var(--pass-fg); }
    .tree-bool-label.false { color: var(--fail-fg); }

    .tree-null  { color: var(--fg-faint); font-style: italic; }
    .tree-empty { color: var(--fg-faint); font-style: italic; font-size: .75rem; }
  </style>
</head>
<body>

<header class="page-header">
  <h1><span id="header-title">Yuruna</span><span id="header-version"></span></h1>
  <span id="header-machine"></span>
</header>

<div id="banner" class="idle">
  <span class="dot"></span>
  <span id="banner-text">Loading…</span>
</div>

<main id="config-body">
  <div class="tree-empty">Loading…</div>
</main>

<div id="config-status"></div>

<div id="config-footer">
  <button type="button" class="config-btn destructive" id="config-save-start">Save and start cycle</button>
  <button type="button" class="config-btn secondary" id="config-discard">Discard</button>
  <button type="button" class="config-btn primary"   id="config-save">Save</button>
</div>

<script src="yuruna.common.js"></script>

</body>
</html>
